<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Bayt Islahe</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .not-found { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .not-found h1 { font-size: 6rem; color: var(--sage); margin-bottom: 8px; }
    .not-found h2 { font-size: 1.8rem; margin-bottom: 16px; }
    .not-found p { color: var(--ink-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="site-header__inner">
    <a href="/" class="site-logo">
      <div class="site-logo__icon">🕌</div>
      <div><div class="site-logo__text">Bayt Islahe</div></div>
    </a>
  </div>
</header>
<main>
  <div class="not-found">
    <div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="cat-pill" style="display:inline-flex;">← Return Home</a>
    </div>
  </div>
</main>
</body>
</html>
